services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: quickbite-postgres
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quickbite-network

  redis:
    image: redis:7-alpine
    container_name: quickbite-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quickbite-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickbite-backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
    - ./backend/.env:/app/.env:ro  
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - quickbite-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quickbite-frontend
    restart: always
    env_file:
      - ./frontend/.env
    volumes:
    - ./frontend/.env:/app/.env:ro    
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - quickbite-network

networks:
  quickbite-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: